<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Map</title>
  <meta name="description" content="スプレッドシートから、今行ける近くのお店を表示する自分専用のマップです。">
  <meta property="og:type" content="website">
  <meta property="og:title" content="My Map">
  <meta property="og:description" content="スプレッドシートから、今行ける近くのお店を表示する自分専用のマップです。">
  <meta property="og:image" content="./img/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="My Map">
  <meta name="twitter:description" content="スプレッドシートから、今行ける近くのお店を表示する自分専用のマップです。">
  <meta name="twitter:image" content="./img/og-image.png">
  <link rel="icon" href="./img/favicon.svg" type="image/svg+xml">
  <style>
    :root {
      --ink: #20211f;
      --muted: #6e746c;
      --line: #d8ddd4;
      --paper: #f7f3ea;
      --panel: #fffffb;
      --leaf: #246b4a;
      --tomato: #c75036;
      --gold: #d6a843;
      --blue: #356b8c;
      --shadow: 0 18px 55px rgba(32, 33, 31, 0.14);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(36, 107, 74, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(199, 80, 54, 0.08), transparent 36%),
        var(--paper);
      font-family: "Hiragino Sans", "Yu Gothic", "YuGothic", "Noto Sans JP", sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto minmax(560px, 1fr);
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 251, 0.92);
      backdrop-filter: blur(16px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 10px 18px;
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .brand {
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, "Segoe UI", Arial, sans-serif;
      font-size: clamp(22px, 2.4vw, 30px);
      font-weight: 700;
      line-height: 1;
    }

    .filters {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      align-items: end;
      justify-content: flex-end;
      min-width: 0;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .filters::-webkit-scrollbar {
      display: none;
    }

    .field {
      display: grid;
      gap: 3px;
      flex: 0 0 auto;
      min-width: 104px;
    }

    .field.genre-field {
      min-width: 112px;
    }

    .field.date-field {
      min-width: 136px;
    }

    .field.time-field,
    .field.radius-field {
      min-width: 104px;
    }

    .field.location-search {
      min-width: 170px;
    }

    .field label,
    .toggle span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
      font-size: 14px;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(36, 107, 74, 0.14);
    }

    .toggle {
      flex: 0 0 auto;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .toggle input {
      flex: 0 0 auto;
      width: 15px;
      height: 15px;
      accent-color: var(--leaf);
    }

    .toggle span {
      line-height: 1;
      white-space: nowrap;
    }

    .icon-button,
    .primary-button,
    .secondary-button {
      flex: 0 0 auto;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      white-space: nowrap;
    }

    .icon-button:hover,
    .primary-button:hover,
    .secondary-button:hover {
      transform: translateY(-1px);
    }

    .primary-button {
      background: var(--leaf);
      color: #fff;
      box-shadow: 0 8px 18px rgba(36, 107, 74, 0.2);
    }

    .secondary-button {
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
    }

    .icon-button {
      width: 34px;
      padding: 0;
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
    }

    .main {
      max-width: 1440px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      min-height: 560px;
    }

    .map-shell {
      position: relative;
      height: min(680px, calc(100vh - 210px));
      min-height: 460px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: #e6e1d6;
    }

    #map {
      width: 100%;
      height: 100%;
      min-height: 460px;
    }

    .map-empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background:
        linear-gradient(90deg, rgba(32, 33, 31, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(32, 33, 31, 0.05) 1px, transparent 1px),
        #efe9dc;
      background-size: 42px 42px;
      z-index: 1;
    }

    .map-empty[hidden] {
      display: none;
    }

    .map-empty strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .map-empty p {
      max-width: 470px;
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .side {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .summary {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      padding: 12px 13px;
      box-shadow: 0 6px 18px rgba(32, 33, 31, 0.06);
    }

    .summary .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .summary .value {
      margin-top: 4px;
      font-size: 26px;
      font-family: "Helvetica Neue", Helvetica, "Segoe UI", Arial, sans-serif;
      font-weight: 700;
      line-height: 1;
    }

    .summary .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .places {
      display: grid;
      align-content: start;
      gap: 7px;
      overflow: auto;
      padding-right: 2px;
    }

    .place {
      border: 1px solid rgba(216, 221, 212, 0.82);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.86);
      padding: 10px 11px;
      display: grid;
      gap: 7px;
      box-shadow: none;
      cursor: pointer;
    }

    .place:hover {
      border-color: rgba(36, 107, 74, 0.45);
      background: #fffffb;
    }

    .place-head {
      display: flex;
      gap: 10px;
      align-items: start;
      justify-content: space-between;
    }

    .place h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.3;
    }

    .distance {
      color: var(--blue);
      font-weight: 800;
      font-size: 12px;
      white-space: nowrap;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      border-radius: 999px;
      padding: 3px 7px;
      background: #f0f4ee;
      color: var(--leaf);
      font-size: 11px;
      font-weight: 700;
    }

    .chip.visited {
      color: #7a4f00;
      background: #fff0c6;
    }

    .place-time,
    .place-memo {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .rating-stars {
      color: var(--gold);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .is-hidden {
      display: none !important;
    }

    .info-window {
      max-width: 250px;
      color: var(--ink);
    }

    .leaflet-container {
      overflow: hidden;
      background: #ddd;
      outline-offset: 1px;
      font-family: inherit;
    }

    .leaflet-pane,
    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow,
    .leaflet-tile-container,
    .leaflet-pane > svg,
    .leaflet-pane > canvas,
    .leaflet-zoom-box,
    .leaflet-image-layer,
    .leaflet-layer {
      position: absolute;
      left: 0;
      top: 0;
    }

    .leaflet-tile,
    .leaflet-marker-icon,
    .leaflet-marker-shadow {
      user-select: none;
      -webkit-user-drag: none;
    }

    .leaflet-tile {
      border: 0;
      filter: none;
      max-width: none !important;
      max-height: none !important;
    }

    .leaflet-tile-pane {
      z-index: 200;
    }

    .leaflet-overlay-pane {
      z-index: 400;
    }

    .leaflet-shadow-pane {
      z-index: 500;
    }

    .leaflet-marker-pane {
      z-index: 600;
    }

    .leaflet-tooltip-pane {
      z-index: 650;
    }

    .leaflet-popup-pane {
      z-index: 700;
    }

    .leaflet-map-pane canvas,
    .leaflet-map-pane svg {
      z-index: 100;
    }

    .leaflet-control {
      position: relative;
      z-index: 800;
      pointer-events: auto;
      float: left;
      clear: both;
    }

    .leaflet-top,
    .leaflet-bottom {
      position: absolute;
      z-index: 1000;
      pointer-events: none;
    }

    .leaflet-top {
      top: 0;
    }

    .leaflet-right {
      right: 0;
    }

    .leaflet-bottom {
      bottom: 0;
    }

    .leaflet-left {
      left: 0;
    }

    .leaflet-control-zoom {
      margin: 10px;
      border: 1px solid rgba(32, 33, 31, 0.16);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(32, 33, 31, 0.14);
    }

    .leaflet-control-zoom a {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .leaflet-control-zoom a + a {
      border-top: 1px solid var(--line);
    }

    .leaflet-control-attribution {
      margin: 0;
      padding: 3px 7px;
      background: rgba(255, 255, 255, 0.82);
      font-size: 11px;
    }

    .leaflet-popup {
      position: absolute;
      text-align: center;
      margin-bottom: 20px;
    }

    .leaflet-popup-content-wrapper {
      padding: 1px;
      text-align: left;
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 12px 32px rgba(32, 33, 31, 0.2);
    }

    .leaflet-popup-content {
      margin: 12px 14px;
      line-height: 1.45;
    }

    .leaflet-popup-tip-container {
      width: 40px;
      height: 20px;
      position: absolute;
      left: 50%;
      margin-left: -20px;
      overflow: hidden;
      pointer-events: none;
    }

    .leaflet-popup-tip {
      width: 14px;
      height: 14px;
      margin: -7px auto 0;
      background: #fff;
      transform: rotate(45deg);
      box-shadow: 0 12px 32px rgba(32, 33, 31, 0.16);
    }

    .leaflet-popup-close-button {
      position: absolute;
      top: 4px;
      right: 6px;
      color: var(--muted);
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
    }

    .custom-marker {
      width: 28px;
      height: 28px;
      border: 3px solid #fff;
      border-radius: 999px 999px 999px 0;
      box-shadow: 0 8px 18px rgba(32, 33, 31, 0.28);
      transform: rotate(-45deg);
    }

    .custom-marker::after {
      content: "";
      position: absolute;
      inset: 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .map-legend {
      margin: 0 0 10px 10px;
      padding: 7px 9px;
      border: 1px solid rgba(32, 33, 31, 0.14);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.92);
      box-shadow: 0 10px 28px rgba(32, 33, 31, 0.12);
      color: var(--ink);
      font-size: 11px;
      line-height: 1.35;
      backdrop-filter: blur(12px);
      max-width: 168px;
    }

    .map-legend-title {
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }

    .map-legend-items {
      display: grid;
      gap: 4px;
    }

    .map-legend-item {
      display: flex;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .map-legend-swatch {
      width: 10px;
      height: 10px;
      border: 2px solid #fff;
      border-radius: 999px;
      box-shadow: 0 0 0 1px rgba(32, 33, 31, 0.12);
      flex: 0 0 auto;
    }

    .map-legend-label {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .current-location-marker {
      width: 30px;
      height: 30px;
      border: 5px solid #fff;
      border-radius: 999px;
      background: var(--blue);
      box-shadow: 0 0 0 8px rgba(53, 107, 140, 0.16), 0 0 0 14px rgba(53, 107, 140, 0.08), 0 8px 18px rgba(32, 33, 31, 0.24);
      position: relative;
    }

    .current-location-marker::after {
      content: "";
      position: absolute;
      inset: 6px;
      border-radius: 999px;
      background: #fff;
    }

    .info-window h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .info-window p {
      margin: 5px 0;
      color: #4d514c;
      line-height: 1.45;
    }

    .svg-icon {
      width: 17px;
      height: 17px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @media (max-width: 1050px) {
      .topbar-inner {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .filters {
        justify-content: flex-start;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .side {
        grid-template-rows: auto auto;
      }

      .places {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        overflow: visible;
      }

    }

    @media (max-width: 680px) {
      .app {
        grid-template-rows: auto auto auto;
      }

      .topbar-inner,
      .main {
        padding-left: 12px;
        padding-right: 12px;
      }

      .topbar-inner {
        padding-top: 8px;
        padding-bottom: 8px;
      }

      .brand {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .brand h1 {
        font-size: 24px;
      }

      .filters {
        align-items: end;
        gap: 7px;
        margin: 0 -12px;
        padding: 0 12px 4px;
      }

      .field,
      .toggle {
        flex: 0 0 auto;
      }

      .field label {
        font-size: 10px;
      }

      .field input,
      .field select,
      .toggle,
      .icon-button {
        height: 32px;
        min-height: 32px;
        font-size: 13px;
      }

      .icon-button {
        width: 32px;
      }

      .field.genre-field {
        min-width: 104px;
      }

      .field.date-field {
        min-width: 132px;
      }

      .field.time-field {
        min-width: 92px;
      }

      .field.radius-field {
        min-width: 96px;
      }

      .field.location-search {
        min-width: 156px;
      }

      .primary-button,
      .secondary-button {
        min-width: 0;
        width: 100%;
      }

      .map-shell,
      #map {
        min-height: 430px;
        height: 430px;
      }

      .places {
        grid-template-columns: 1fr;
      }

    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <h1>My Map</h1>
        </div>

        <div class="filters" aria-label="絞り込み">
          <div class="field genre-field">
            <label for="genreFilter">ジャンル</label>
            <select id="genreFilter">
              <option value="">すべて</option>
            </select>
          </div>

          <div class="field date-field">
            <label for="dateFilter">判定日</label>
            <input id="dateFilter" type="date">
          </div>

          <div class="field time-field">
            <label for="timeFilter">判定時刻</label>
            <input id="timeFilter" type="time">
          </div>

          <div class="field radius-field">
            <label for="radiusFilter">距離</label>
            <select id="radiusFilter">
              <option value="3">3km以内</option>
              <option value="5" selected>5km以内</option>
              <option value="10">10km以内</option>
              <option value="">すべて</option>
            </select>
          </div>

          <label class="toggle">
            <input id="openOnlyFilter" type="checkbox">
            <span>営業中のみ</span>
          </label>

          <label class="toggle">
            <input id="includeVisitedFilter" type="checkbox" checked>
            <span>訪問済み含む</span>
          </label>

          <div class="field location-search">
            <label for="locationSearchInput">駅名・ランドマーク</label>
            <input id="locationSearchInput" type="search" placeholder="例: 品川駅">
          </div>

          <button id="locationSearchButton" class="icon-button" type="button" title="場所を検索" aria-label="場所を検索">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          </button>

          <button id="locateButton" class="icon-button" type="button" title="現在地を再取得" aria-label="現在地を再取得">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v3"/><path d="M12 19v3"/><path d="M2 12h3"/><path d="M19 12h3"/><circle cx="12" cy="12" r="7"/><circle cx="12" cy="12" r="2"/></svg>
          </button>

          <button id="reloadButton" class="icon-button" type="button" title="データを再読み込み" aria-label="データを再読み込み">
            <svg class="svg-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.3"/><path d="M3 12A9 9 0 0 1 18.3 5.7"/><path d="M18 2v4h-4"/><path d="M6 22v-4h4"/></svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="map-shell" aria-label="地図">
        <div id="map"></div>
        <div id="mapEmpty" class="map-empty">
          <div>
            <strong>地図を読み込んでいます</strong>
            <p>公開済みスプレッドシートの店舗データを読み込み、品川中心のマップを表示します。</p>
          </div>
        </div>
      </section>

      <aside class="side" aria-label="近いお店">
        <section class="summary">
          <div class="label">条件に合う近くのお店</div>
          <div id="matchCount" class="value">0件</div>
          <div id="summaryNote" class="note">品川周辺の近いお店を最大5件表示します。</div>
        </section>
        <section id="placeList" class="places" aria-live="polite"></section>
      </aside>
    </main>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/1Nom2VVA60XmEZ3jXH9psGn3X_MX6nX-NiZXpOtazSKE/edit?gid=0#gid=0";
    const DEFAULT_SHEET_GID = "0";
    const DEFAULT_CENTER = { lat: 35.6284713, lng: 139.7387599 };
    const DEFAULT_RADIUS_KM = 5;
    const WEEK_KEYS = ["日", "月", "火", "水", "木", "金", "土"];

    const state = {
      map: null,
      legendControl: null,
      currentMarker: null,
      markers: [],
      places: [],
      userPosition: DEFAULT_CENTER,
      centerLabel: "品川",
      suppressMapMoveUpdate: false,
      defaultDate: "",
      defaultTime: ""
    };

    const elements = {
      mapEmpty: document.getElementById("mapEmpty"),
      genreFilter: document.getElementById("genreFilter"),
      dateFilter: document.getElementById("dateFilter"),
      timeFilter: document.getElementById("timeFilter"),
      radiusFilter: document.getElementById("radiusFilter"),
      openOnlyFilter: document.getElementById("openOnlyFilter"),
      includeVisitedFilter: document.getElementById("includeVisitedFilter"),
      locationSearchInput: document.getElementById("locationSearchInput"),
      locationSearchButton: document.getElementById("locationSearchButton"),
      locateButton: document.getElementById("locateButton"),
      reloadButton: document.getElementById("reloadButton"),
      matchCount: document.getElementById("matchCount"),
      summaryNote: document.getElementById("summaryNote"),
      placeList: document.getElementById("placeList")
    };

    boot();

    function boot() {
      setDefaultTime();
      bindEvents();
      startApp();
    }

    function bindEvents() {
      elements.genreFilter.addEventListener("change", applyFilters);
      elements.dateFilter.addEventListener("change", applyFilters);
      elements.timeFilter.addEventListener("change", applyFilters);
      elements.radiusFilter.addEventListener("change", applyFilters);
      elements.openOnlyFilter.addEventListener("change", applyFilters);
      elements.includeVisitedFilter.addEventListener("change", applyFilters);
      elements.locationSearchButton.addEventListener("click", searchLocation);
      elements.locationSearchInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          searchLocation();
        }
      });
      elements.locateButton.addEventListener("click", locateUser);
      elements.reloadButton.addEventListener("click", loadSheetData);
    }

    async function startApp() {
      try {
        initMap();
        centerMap(DEFAULT_CENTER);
        renderCurrentMarker();
        await loadSheetData();
      } catch (error) {
        setStatus(error.message || "読み込みに失敗しました。", true);
      }
    }

    function initMap() {
      if (state.map) {
        return;
      }

      if (!window.L) {
        throw new Error("Leafletを読み込めませんでした。ネットワーク接続を確認してください。");
      }

      state.map = L.map("map", {
        zoomControl: true,
        attributionControl: true,
        scrollWheelZoom: false,
        touchZoom: true
      }).setView([DEFAULT_CENTER.lat, DEFAULT_CENTER.lng], 15);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
      }).addTo(state.map);

      state.map.on("moveend", handleMapMoveEnd);
      initLegendControl();
      elements.mapEmpty.hidden = true;
      requestAnimationFrame(() => state.map.invalidateSize());
    }

    function handleMapMoveEnd() {
      if (state.suppressMapMoveUpdate || !state.map) {
        return;
      }

      const center = state.map.getCenter();
      state.userPosition = {
        lat: center.lat,
        lng: center.lng
      };
      state.centerLabel = "地図の中心";
      renderCurrentMarker();
      applyFilters();
    }

    function initLegendControl() {
      if (state.legendControl || !state.map) {
        return;
      }
      state.legendControl = L.control({ position: "bottomleft" });
      state.legendControl.onAdd = () => {
        const container = L.DomUtil.create("div", "map-legend");
        L.DomEvent.disableClickPropagation(container);
        L.DomEvent.disableScrollPropagation(container);
        container.innerHTML = '<div class="map-legend-title">ジャンル</div><div class="map-legend-items"></div>';
        return container;
      };
      state.legendControl.addTo(state.map);
    }

    function locateUser() {
      if (!navigator.geolocation) {
        state.userPosition = DEFAULT_CENTER;
        state.centerLabel = "品川";
        centerMap(DEFAULT_CENTER);
        renderCurrentMarker();
        setStatus("このブラウザでは現在地を取得できないため、品川を中心に表示しています。");
        return Promise.resolve(DEFAULT_CENTER);
      }

      setStatus("現在地を取得しています。");

      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            state.userPosition = {
              lat: position.coords.latitude,
              lng: position.coords.longitude
            };
            state.centerLabel = "現在地";
            centerMap(state.userPosition);
            renderCurrentMarker();
            applyFilters();
            setStatus("現在地を中心に表示しています。");
            resolve(state.userPosition);
          },
          () => {
            state.userPosition = DEFAULT_CENTER;
            state.centerLabel = "品川";
            centerMap(DEFAULT_CENTER);
            renderCurrentMarker();
            applyFilters();
            setStatus("現在地の取得が許可されなかったため、品川を中心に表示しています。");
            resolve(DEFAULT_CENTER);
          },
          { enableHighAccuracy: true, timeout: 9000, maximumAge: 60000 }
        );
      });
    }

    function centerMap(position, zoom = state.map?.getZoom() || 15) {
      if (state.map && position) {
        moveMapTo(position, zoom);
      }
    }

    function moveMapTo(position, zoom) {
      if (!state.map || !position) {
        return;
      }

      state.suppressMapMoveUpdate = true;
      state.map.setView([position.lat, position.lng], zoom, { animate: false });
      requestAnimationFrame(() => {
        state.suppressMapMoveUpdate = false;
      });
    }

    function renderCurrentMarker() {
      if (!state.map || !state.userPosition) {
        return;
      }
      if (state.currentMarker) {
        state.currentMarker.setLatLng([state.userPosition.lat, state.userPosition.lng]);
        state.currentMarker.bindPopup(state.centerLabel);
        return;
      }
      state.currentMarker = L.marker([state.userPosition.lat, state.userPosition.lng], {
        title: state.centerLabel,
        icon: L.divIcon({
          className: "",
          html: '<div class="current-location-marker"></div>',
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        })
      }).addTo(state.map).bindPopup(state.centerLabel);
    }

    async function searchLocation() {
      const query = elements.locationSearchInput.value.trim();
      if (!query) {
        setStatus("駅名やランドマーク名を入力してください。", true);
        return;
      }

      setStatus(`「${query}」を検索しています。`);

      try {
        const result = await geocodeLocation(query);
        state.userPosition = {
          lat: Number(result.lat),
          lng: Number(result.lon)
        };
        state.centerLabel = result.display_name ? `検索地点: ${query}` : query;
        centerMap(state.userPosition, Math.max(state.map?.getZoom() || 15, 15));
        renderCurrentMarker();
        applyFilters();
        setStatus(`「${query}」周辺を中心に表示しています。`);
      } catch (error) {
        setStatus(error.message || "場所を検索できませんでした。別の駅名やランドマーク名で試してください。", true);
      }
    }

    async function geocodeLocation(query) {
      const url = new URL("https://nominatim.openstreetmap.org/search");
      url.searchParams.set("format", "jsonv2");
      url.searchParams.set("q", query);
      url.searchParams.set("limit", "1");
      url.searchParams.set("countrycodes", "jp");
      url.searchParams.set("accept-language", "ja");

      const response = await fetch(url.toString(), {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!response.ok) {
        throw new Error("場所検索サービスに接続できませんでした。時間をおいて再度試してください。");
      }

      const results = await response.json();
      if (!Array.isArray(results) || !results.length) {
        throw new Error("該当する場所が見つかりませんでした。別の名前で検索してください。");
      }

      return results[0];
    }

    async function loadSheetData() {
      setStatus("スプレッドシートを読み込んでいます。");

      try {
        const table = await loadSheetTable(DEFAULT_SHEET_URL, DEFAULT_SHEET_GID);
        state.places = normalizeRows(table);

        populateGenres();
        applyFilters();
        setStatus(`${state.places.length}件の店舗データを読み込みました。`);
      } catch (error) {
        state.places = [];
        applyFilters();
        const message = error instanceof TypeError
          ? sheetReadErrorMessage()
          : error.message || sheetReadErrorMessage();
        setStatus(message, true);
      }
    }

    function loadSheetTable(sheetUrl, gid) {
      const url = buildSheetJsonUrl(sheetUrl, gid);
      const callbackName = `personalFoodMapSheet_${Date.now()}_${Math.floor(Math.random() * 100000)}`;
      const jsonpUrl = `${url}&tqx=${encodeURIComponent(`out:json;responseHandler:${callbackName}`)}`;

      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        const timer = window.setTimeout(() => {
          cleanup();
          reject(new Error(sheetReadErrorMessage()));
        }, 10000);

        function cleanup() {
          window.clearTimeout(timer);
          script.remove();
          delete window[callbackName];
        }

        window[callbackName] = (response) => {
          cleanup();
          if (response?.status !== "ok" || !response.table) {
            reject(new Error(sheetReadErrorMessage()));
            return;
          }
          resolve(response.table);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error(sheetReadErrorMessage()));
        };

        script.src = jsonpUrl;
        document.head.appendChild(script);
      });
    }

    function buildSheetJsonUrl(sheetUrl, gid) {
      const idMatch = sheetUrl.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (!idMatch) {
        throw new Error("GoogleスプレッドシートURLの形式を確認してください。");
      }
      const sheetId = idMatch[1];
      const resolvedGid = normalizeSheetId(gid, sheetUrl);
      return `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?gid=${encodeURIComponent(resolvedGid)}`;
    }

    function normalizeRows(table) {
      const headers = table.cols.map((col) => (col.label || "").trim());
      const rows = table.rows || [];

      return rows.map((row) => {
        const values = {};
        headers.forEach((header, index) => {
          values[header] = cellValue(row.c[index]);
        });

        const lat = parseNumber(values["緯度"]);
        const lng = parseNumber(values["経度"]);
        if (!values["店名"] || Number.isNaN(lat) || Number.isNaN(lng)) {
          return null;
        }

        return {
          name: String(values["店名"]).trim(),
          address: String(values["住所"] || "").trim(),
          lat,
          lng,
          genre: String(values["ジャンル"] || "").trim() || "未分類",
          hours: buildBusinessHours(values),
          memo: String(values["メモ"] || "").trim(),
          rating: String(values["おすすめ度"] || "").trim(),
          visited: isTruthy(values["訪問済み"])
        };
      }).filter(Boolean);
    }

    function buildBusinessHours(values) {
      const fallbackOpen = parseTimeValue(values["開店時間"]);
      const fallbackClose = parseTimeValue(values["閉店時間"]);

      return WEEK_KEYS.reduce((hours, dayKey) => {
        const ranges = parseBusinessHours(values[`${dayKey}営業時間`]);
        if (ranges.length) {
          hours[dayKey] = ranges;
          return hours;
        }

        const open = parseTimeValue(values[`${dayKey}開店`]);
        const close = parseTimeValue(values[`${dayKey}閉店`]);

        if (open && close) {
          hours[dayKey] = [{ open, close }];
          return hours;
        }

        if (isTruthy(values[dayKey]) && fallbackOpen && fallbackClose) {
          hours[dayKey] = [{ open: fallbackOpen, close: fallbackClose }];
        }

        return hours;
      }, {});
    }

    function cellValue(cell) {
      if (!cell) {
        return "";
      }
      return cell.f ?? cell.v ?? "";
    }

    function parseNumber(value) {
      return Number(String(value).replace(",", "."));
    }

    function isTruthy(value) {
      const normalized = String(value ?? "").trim().toLowerCase();
      return ["1", "true", "yes", "y", "○", "◯"].includes(normalized);
    }

    function parseBusinessHours(value) {
      return String(value ?? "")
        .split(/[,、，]/)
        .map((range) => range.trim())
        .map((range) => {
          const parts = range.split(/\s*[-ー〜～]\s*/);
          if (parts.length !== 2) {
            return null;
          }
          const open = parseTimeValue(parts[0]);
          const close = parseTimeValue(parts[1]);
          return open && close ? { open, close } : null;
        })
        .filter(Boolean);
    }

    function parseTimeValue(value) {
      const raw = String(value ?? "").trim();
      const match = raw.match(/(\d{1,2}):(\d{2})/);
      if (!match) {
        return "";
      }
      return `${match[1].padStart(2, "0")}:${match[2]}`;
    }

    function populateGenres() {
      const selected = elements.genreFilter.value;
      const genres = [...new Set(state.places.map((place) => place.genre).filter(Boolean))].sort(compareGenres);
      elements.genreFilter.innerHTML = `<option value="">すべて</option>${genres.map((genre) => `<option value="${escapeHtml(genre)}">${escapeHtml(genre)}</option>`).join("")}`;
      if (genres.includes(selected)) {
        elements.genreFilter.value = selected;
      }
    }

    function compareGenres(a, b) {
      if (a === "その他" && b !== "その他") {
        return 1;
      }
      if (b === "その他" && a !== "その他") {
        return -1;
      }
      return a.localeCompare(b, "ja");
    }

    function applyFilters() {
      const selectedGenre = elements.genreFilter.value;
      const openOnly = elements.openOnlyFilter.checked;
      const includeVisited = elements.includeVisitedFilter.checked;
      const time = elements.timeFilter.value || currentTimeString();
      const radiusKm = selectedRadiusKm();
      const selectedDate = parseDateInput(elements.dateFilter.value);
      const selectedDayKey = WEEK_KEYS[selectedDate.getDay()];

      const filtered = state.places
        .filter((place) => !selectedGenre || place.genre === selectedGenre)
        .filter((place) => includeVisited || !place.visited)
        .filter((place) => !openOnly || isOpenAt(place, selectedDayKey, time))
        .map((place) => ({
          ...place,
          displayDayKey: selectedDayKey,
          displayHours: hoursForDay(place, selectedDayKey),
          distanceKm: state.userPosition ? distanceKm(state.userPosition, place) : null
        }))
        .filter((place) => radiusKm === null || place.distanceKm === null || place.distanceKm <= radiusKm)
        .sort((a, b) => {
          if (a.distanceKm === null && b.distanceKm === null) return a.name.localeCompare(b.name, "ja");
          if (a.distanceKm === null) return 1;
          if (b.distanceKm === null) return -1;
          return a.distanceKm - b.distanceKm;
        });

      renderMarkers(filtered);
      renderLegend(filtered);
      renderPlaceList(filtered.slice(0, 5));
      elements.matchCount.textContent = `${filtered.length}件`;
      elements.summaryNote.textContent = state.userPosition
        ? `${state.centerLabel}から${radiusLabel(radiusKm)}を近い順に最大5件表示しています。`
        : "現在地がないため距離順ではなく店名順で表示しています。";
    }

    function selectedRadiusKm() {
      const value = elements.radiusFilter.value;
      if (!value) {
        return null;
      }
      const radius = Number(value);
      return Number.isFinite(radius) ? radius : DEFAULT_RADIUS_KM;
    }

    function radiusLabel(radiusKm) {
      return radiusKm === null ? "全距離" : `${radiusKm}km以内`;
    }

    function isOpenAt(place, dayKey, time) {
      const ranges = hoursForDay(place, dayKey);
      if (!ranges.length || !time) {
        return false;
      }

      const current = timeToMinutes(time);
      if (Number.isNaN(current)) {
        return false;
      }

      return ranges.some((range) => isTimeInRange(current, range));
    }

    function hoursForDay(place, dayKey) {
      return place.hours?.[dayKey] || [];
    }

    function isTimeInRange(current, range) {
      const open = timeToMinutes(range.open);
      const close = timeToMinutes(range.close);

      if (Number.isNaN(open) || Number.isNaN(close)) {
        return false;
      }

      if (close >= 1440 || close < open) {
        const adjustedCurrent = current < open ? current + 1440 : current;
        const adjustedClose = close < open ? close + 1440 : close;
        return adjustedCurrent >= open && adjustedCurrent <= adjustedClose;
      }

      return current >= open && current <= close;
    }

    function timeToMinutes(time) {
      const match = String(time).match(/^(\d{1,2}):(\d{2})$/);
      if (!match) {
        return Number.NaN;
      }
      const hours = Number(match[1]);
      const minutes = Number(match[2]);
      if (minutes > 59) {
        return Number.NaN;
      }
      return hours * 60 + minutes;
    }

    function renderMarkers(places) {
      if (!state.map || !window.L) {
        return;
      }

      state.markers.forEach(({ marker }) => marker.remove());
      state.markers = places.map((place) => {
        const marker = L.marker([place.lat, place.lng], {
          title: place.name,
          icon: markerIcon(place.genre)
        }).addTo(state.map);
        marker.bindPopup(infoHtml(place));
        marker.on("mouseover", () => marker.openPopup());
        marker.on("click", () => marker.openPopup());
        return { place, marker };
      });
    }

    function markerIcon(genre) {
      return L.divIcon({
        className: "",
        html: `<div class="custom-marker" style="background:${genreColor(genre)}"></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28],
        popupAnchor: [0, -28]
      });
    }

    function renderLegend(places) {
      const items = document.querySelector(".map-legend-items");
      if (!items) {
        return;
      }
      const genres = [...new Set(places.map((place) => place.genre).filter(Boolean))].sort(compareGenres);
      items.innerHTML = genres.length
        ? genres.map((genre) => `
          <div class="map-legend-item">
            <span class="map-legend-swatch" style="background:${genreColor(genre)}"></span>
            <span class="map-legend-label">${escapeHtml(genre)}</span>
          </div>
        `).join("")
        : '<div class="map-legend-label">該当なし</div>';
    }

    function genreColor(genre) {
      const fixed = {
        "カフェ": "#2f80ed",
        "イタリアン": "#d64f3b",
        "フレンチ": "#7b61ff",
        "和食": "#2f855a",
        "中華": "#e09f1f",
        "エスニック": "#c05621",
        "レンタルルーム": "#2c7a7b",
        "その他": "#6e746c",
        "未分類": "#6e746c"
      };
      if (fixed[genre]) {
        return fixed[genre];
      }
      const palette = ["#2f80ed", "#d64f3b", "#2f855a", "#7b61ff", "#e09f1f", "#2c7a7b", "#c05621", "#805ad5"];
      let hash = 0;
      for (const char of String(genre || "")) {
        hash = (hash * 31 + char.charCodeAt(0)) >>> 0;
      }
      return palette[hash % palette.length];
    }

    function infoHtml(place) {
      return `
        <div class="info-window">
          <h3>${escapeHtml(place.name)}</h3>
          <p><strong>${escapeHtml(place.genre)}</strong> / ${escapeHtml(timeRange(place))}</p>
          ${place.address ? `<p>${escapeHtml(place.address)}</p>` : ""}
          ${place.memo ? `<p>${escapeHtml(place.memo)}</p>` : ""}
          <p>おすすめ度: <span class="rating-stars">${ratingStars(place.rating)}</span></p>
          <p>${place.visited ? "訪問済み" : "未訪問"}</p>
        </div>
      `;
    }

    function renderPlaceList(places) {
      if (!places.length) {
        elements.placeList.innerHTML = `
          <article class="place">
            <h2>該当するお店がありません</h2>
            <p class="place-memo">データは読み込めています。営業中のみ、距離、ジャンル、検索地点の条件をゆるめてください。</p>
          </article>
        `;
        return;
      }

      elements.placeList.innerHTML = places.map((place, index) => `
        <article class="place" data-index="${index}">
          <div class="place-head">
            <h2>${escapeHtml(place.name)}</h2>
            <span class="distance">${formatDistance(place.distanceKm)}</span>
          </div>
          <div class="chips">
            <span class="chip">${escapeHtml(place.genre)}</span>
            <span class="chip ${place.visited ? "visited" : ""}">${place.visited ? "訪問済み" : "未訪問"}</span>
          </div>
          <p class="place-time">${escapeHtml(timeRange(place))}</p>
          <p class="place-memo">おすすめ度: <span class="rating-stars">${ratingStars(place.rating)}</span></p>
          ${place.memo ? `<p class="place-memo">${escapeHtml(place.memo)}</p>` : ""}
        </article>
      `).join("");

      [...elements.placeList.querySelectorAll(".place")].forEach((card, index) => {
        card.addEventListener("click", () => {
          const place = places[index];
          if (!state.map) {
            return;
          }
          moveMapTo(place, Math.max(state.map.getZoom(), 16));
          const match = state.markers.find((item) => item.place.name === place.name);
          if (match) {
            match.marker.openPopup();
          }
        });
      });
    }

    function timeRange(place) {
      const dayKey = place.displayDayKey || selectedDateKey();
      const ranges = place.displayHours || hoursForDay(place, dayKey);
      if (!ranges.length) {
        return `${dayKey}は休み`;
      }
      return `${dayKey} ${ranges.map((range) => `${range.open}-${range.close}`).join(", ")}`;
    }

    function selectedDateKey() {
      return WEEK_KEYS[parseDateInput(elements.dateFilter.value).getDay()];
    }

    function ratingStars(value) {
      const rating = Math.max(0, Math.min(5, Math.round(Number(value) || 0)));
      return `${"★".repeat(rating)}${"☆".repeat(5 - rating)}`;
    }

    function formatDistance(km) {
      if (km === null || Number.isNaN(km)) {
        return "--";
      }
      if (km < 1) {
        return `${Math.round(km * 1000)}m`;
      }
      return `${km.toFixed(1)}km`;
    }

    function distanceKm(from, to) {
      const radius = 6371;
      const dLat = toRadians(to.lat - from.lat);
      const dLng = toRadians(to.lng - from.lng);
      const lat1 = toRadians(from.lat);
      const lat2 = toRadians(to.lat);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng / 2) ** 2;
      return radius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function toRadians(value) {
      return value * Math.PI / 180;
    }

    function setDefaultTime() {
      state.defaultDate = currentDateString();
      state.defaultTime = currentTimeString();
      elements.dateFilter.value = state.defaultDate;
      elements.timeFilter.value = state.defaultTime;
    }

    function currentDateString() {
      const now = new Date();
      return [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join("-");
    }

    function currentTimeString() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    }

    function parseDateInput(value) {
      const match = String(value || "").match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) {
        return new Date();
      }
      return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function extractGid(sheetUrl) {
      const match = String(sheetUrl || "").match(/[?&#]gid=(\d+)/);
      return match ? match[1] : "";
    }

    function normalizeSheetId(value, sheetUrl) {
      const raw = String(value || "").trim();
      if (/^\d+$/.test(raw)) {
        return raw;
      }
      return extractGid(raw) || extractGid(sheetUrl) || "0";
    }

    function setStatus(message, isError = false) {
      if (isError) {
        elements.summaryNote.textContent = message;
      }
    }

    function sheetReadErrorMessage() {
      return "シートが公開閲覧できる状態になっていない、またはURL/ネットワークの問題がある場合に出ます。";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
